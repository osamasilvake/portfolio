name: portfolio-dev

services:
    postgres:
        image: postgres:16-alpine
        container_name: portfolio-postgres-dev
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: osama007
            POSTGRES_DB: portfolio_db
        ports:
            - '5433:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d portfolio_db']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    app:
        image: node:24.15.0-slim
        container_name: portfolio-app-dev
        working_dir: /app
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - '3000:3000'
        volumes:
            - .:/app
            - /app/node_modules
        env_file:
            - .env
        environment:
            DATABASE_URL: postgresql://postgres:osama007@postgres:5432/portfolio_db
        command: sh docker/dev-entry.sh
        restart: unless-stopped

volumes:
    postgres_data:
